# =============================================================================
# CD — Continuous Delivery (build + push Docker image to GHCR)
# =============================================================================
# Triggered on: new semantic version tag (v*.*.*)
# Jobs: build Docker image → tag with semver + latest + sha → push to GHCR
# =============================================================================
# Token explanation:
#   - GITHUB_TOKEN is automatically generated for each workflow run.
#   - It already has permission to push to GHCR (packages: write).
#   - No Personal Access Token (PAT) or manual secret setup is needed.
#   - The docker/login-action uses this token to authenticate with ghcr.io.
# =============================================================================

name: CD

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Login to GHCR using the automatic GITHUB_TOKEN
      # No manual token configuration needed — GitHub provides this automatically
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate tags: semver (2.1.0, 2.1, 2) + latest + sha-short
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # Supply chain security: generate provenance attestation
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
